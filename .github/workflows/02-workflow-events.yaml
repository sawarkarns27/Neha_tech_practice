name : 02 - Workflow Events
on :
    push :
    pull_request :
    schedule : 
        - cron : "* /30 * * * *"

jobs :
    echo_push : 
        if : github.event_name == 'push'
        runs-on : ubuntu-latest
        steps :
        - name : push trigger       
          run : "echo Hey run on push event : ${{github.event_name}}"  
    
    echo_pull_request :
        if : github.event_name == 'pull_request'
        runs-on : ubuntu-latest
        steps :
            - name : pull request trigger
              run : "echo pull request trigger : ${{github.event_name}}"

    cron_trigger : 
        if : github.event_name == 'schedule'
        runs-on : ubuntu-latest
        steps :
            - name : cron scheduler trigger
              run : "echo cron runs on every 30 mins : ${{github.event_name}}"



